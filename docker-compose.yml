services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text-analysis-backend
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: text-analysis-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
